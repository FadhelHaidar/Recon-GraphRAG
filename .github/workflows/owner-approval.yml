name: Owner Approval

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  owner-approval:
    runs-on: ubuntu-latest

    steps:
      - name: Require owner approval for external PRs
        uses: actions/github-script@v7
        with:
          script: |
            const requiredOwner = 'FadhelHaidar';
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed('This workflow must run from a pull request event.');
              return;
            }

            if (pr.user.login === requiredOwner) {
              core.notice(`PR author is ${requiredOwner}; owner approval is not required.`);
              return;
            }

            const { owner, repo } = context.repo;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const hasCurrentOwnerApproval = reviews.some((review) => (
              review.user?.login === requiredOwner
              && review.state === 'APPROVED'
              && review.commit_id === pr.head.sha
            ));

            if (!hasCurrentOwnerApproval) {
              core.setFailed(
                `PRs opened by ${pr.user.login} require approval from ${requiredOwner} on the latest commit (${pr.head.sha}).`
              );
              return;
            }

            core.notice(`Latest commit approved by ${requiredOwner}.`);
